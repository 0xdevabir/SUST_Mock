services:
  - type: web
    name: crm-ticket-sorter
    runtime: python
    rootDir: crm-ticket-sorter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
